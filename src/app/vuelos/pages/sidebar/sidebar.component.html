<div class="container parrafo pt-2  h-md-25 mt-2 mb-2 sidenav" *ngIf="isSidebarVisible">

  <div class="card-body">

    <div class="offcanvas-header d-flex align-items-center justify-content-around">

        <iframe class="logo "
          src="https://lottie.host/embed/cb10017e-6798-40b2-80cc-48329373d4fc/QOKJqWS6KO.lottie"></iframe>
        <h5 class="text-sm text-light">SpaceAirTracker</h5>



      <button (click)="isSidebarVisible = !isSidebarVisible" type="button"
        class="btn btn-danger btn-outline-danger ml-2 text-light ">X</button>
    </div>

    <hr>

    <img src="https://queretaro.quadratin.com.mx/www/wp-content/uploads/2023/08/f1280x720-20116_151791_7024.jpg"
      class="img-fluid card-image-center imagen ">

    <div class="card-text text-center mt-2">

      <div class="row" *ngFor="let flight of flightInformations">
        <div class="col">
          <h6 class="text-bolder">Numero de Vuelo</h6>
          <h5 class="bg-info p-1">{{flight.callsign}}</h5>
        </div>

        <div class="col">
          <p class="flecha">&rarr;</p>
          <p class="flecha">&rarr;</p>
        </div>

        <div class="col">
          <h6>{{"speed"| transloco}}</h6>
          <h4 class="bg-warning p-1">{{"speed"| transloco}}</h4>
          <h4 class="bg-info p-1">{{flight.speed}} </h4>
        </div>
      </div>

      <div class="offcanvas-body mb-3">
        <h5>{{'flightInformation' | transloco}}</h5>

        <ul class="list-group" *ngFor="let flight of flightInformations">

          <li class="list-group-item"><i class="fa-solid fa-globe">{{flight.latitude}}</i> {{'latitude' | transloco}}</li>
          <li class="list-group-item"><i class="fa-solid fa-ruler"> {{flight.longitude}}</i> {{'longitude' | transloco}}</li>
          <li class="list-group-item"><i class="fa-solid fa-fingerprint">{{flight.icao}}</i> ICAO</li>

        </ul>





      </div>

    </div>
  </div>
</div>
